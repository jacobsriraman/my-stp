<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Fit Calculator</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <h1>My-STP</h1>
    <form id="data-form">
        <table id="input-table">
            <thead>
                <tr><th>Race Duration (seconds)</th><th>Race Distance (meters)</th></tr>
            </thead>
            <tbody>
                <tr><td><input type="number" id="duration" step="any"></td><td><input type="number" id="distance" step="any"></td></tr>
                <tr><td><input type="number" id="duration" step="any"></td><td><input type="number" id="distance" step="any"></td></tr>
            </tbody>
        </table>
        <button type="button" id="add-row">Add Row</button>
        <button type="button" id="remove-row">Remove Row</button>
        <button type="button" id="clear-table">Clear</button>
        <button type="submit">Submit</button>
    </form>
    <div id="result"></div>
    <script type="module" src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
